name: CI - End-to-End Tests (Playwright + Allure)

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 1'  # Every Monday at 00:00 UTC // Minute → Hour → Day → Month → Weekday

jobs:
  e2e-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      # Run Smoke Tests for PR
      - name: Run Smoke Tests
        if: github.event_name == 'pull_request'
        run: npx playwright test --grep @smoke
        env:
          UI_BASE_URL: ${{ secrets.UI_BASE_URL }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          USER_EMAIL: ${{ secrets.USER_EMAIL }}
          PARTNER_EMAIL: ${{ secrets.PARTNER_EMAIL }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          PASSWORD: ${{ secrets.PASSWORD }}
          MONGO_URL: ${{ secrets.MONGO_URL }}

      # Run Full Regression on Main Push
      - name: Run Full Regression Tests
        if: github.ref == 'refs/heads/main'
        run: npx playwright test
        env:
          UI_BASE_URL: ${{ secrets.UI_BASE_URL }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          USER_EMAIL: ${{ secrets.USER_EMAIL }}
          PARTNER_EMAIL: ${{ secrets.PARTNER_EMAIL }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          PASSWORD: ${{ secrets.PASSWORD }}
          MONGO_URL: ${{ secrets.MONGO_URL }}

      - name: Install Allure CLI
        if: always()
        run: npm install -g allure-commandline

      - name: Generate Allure Report
        if: always()
        run: allure generate allure-results --clean -o allure-report

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - name: Deploy Allure Report to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report